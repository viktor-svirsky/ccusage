name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.0)'
        required: true

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       !startsWith(github.event.pull_request.title, 'chore:'))
    runs-on: macos-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      # Cache Xcode DerivedData so the widget archive (~45-60s cold) is incremental on
      # consecutive releases. Key busts when widget target files change.
      - name: Cache Xcode DerivedData
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
            ~/Library/Caches/org.swift.swiftpm
          key: xcode-${{ runner.os }}-${{ hashFiles('CCUsageWidget/**/*.pbxproj', 'CCUsageWidget/**/*.entitlements', 'CCUsageWidget/**/Info.plist', 'CCUsageWidget/**/*.swift') }}
          restore-keys: |
            xcode-${{ runner.os }}-

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_ENV
            echo "TAG=v${{ inputs.version }}" >> $GITHUB_ENV
            echo "bump=manual" >> $GITHUB_OUTPUT
          else
            TITLE="${{ github.event.pull_request.title }}"

            # Use highest existing tag as base, not VERSION file (avoids race condition
            # when two PRs merge before housekeeping PR updates VERSION on main)
            CURRENT=$(git tag -l 'v*' | sed 's/^v//' | sort -V | tail -1)
            if [ -z "$CURRENT" ]; then
              CURRENT=$(cat VERSION)
            fi
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

            if echo "$TITLE" | grep -qiE '^feat(\(.*\))?!:|^[a-z]+(\(.*\))?!:|BREAKING CHANGE'; then
              MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
              echo "bump=major" >> $GITHUB_OUTPUT
            elif echo "$TITLE" | grep -qiE '^feat(\(.*\))?:'; then
              MINOR=$((MINOR + 1)); PATCH=0
              echo "bump=minor" >> $GITHUB_OUTPUT
            elif echo "$TITLE" | grep -qiE '^fix(\(.*\))?:'; then
              PATCH=$((PATCH + 1))
              echo "bump=patch" >> $GITHUB_OUTPUT
            else
              echo "bump=none" >> $GITHUB_OUTPUT
              echo "No version bump needed for: $TITLE"
            fi

            NEW="${MAJOR}.${MINOR}.${PATCH}"
            echo "VERSION=$NEW" >> $GITHUB_ENV
            echo "TAG=v$NEW" >> $GITHUB_ENV
            echo "OLD_VERSION=$CURRENT" >> $GITHUB_ENV
          fi

      - name: Check if release already exists
        if: steps.version.outputs.bump != 'none'
        run: |
          if git ls-remote --tags origin "refs/tags/${{ env.TAG }}" | grep -q .; then
            echo "Tag ${{ env.TAG }} already exists, skipping."
            echo "SKIP_RELEASE=true" >> $GITHUB_ENV
          fi

      - name: Run tests
        if: steps.version.outputs.bump != 'none' && env.SKIP_RELEASE != 'true'
        run: make test

      - name: Build app
        if: steps.version.outputs.bump != 'none' && env.SKIP_RELEASE != 'true'
        # PRODUCTION=1 tags Sentry events from this build as environment=production.
        run: make build VERSION=${{ env.VERSION }} PRODUCTION=1

      - name: Create release archive
        if: steps.version.outputs.bump != 'none' && env.SKIP_RELEASE != 'true'
        run: ditto -c -k --keepParent CCUsage.app CCUsage.zip

      - name: Build iOS widget IPA
        if: steps.version.outputs.bump != 'none' && env.SKIP_RELEASE != 'true'
        run: |
          make widget VERSION=${{ env.VERSION }}
          cp /tmp/CCUsageWidgetApp.ipa CCUsageWidgetApp.ipa

      - name: Create tag
        if: steps.version.outputs.bump != 'none' && env.SKIP_RELEASE != 'true'
        run: |
          git tag ${{ env.TAG }}
          git push origin ${{ env.TAG }}

      - name: Create GitHub Release
        if: steps.version.outputs.bump != 'none' && env.SKIP_RELEASE != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: CCUsage ${{ env.TAG }}
          files: |
            CCUsage.zip
            CCUsageWidgetApp.ipa
          generate_release_notes: true

      # Belt-and-suspenders: download the published zip and re-run codesign --verify
      # on it. The Makefile already runs this pre-upload but CDN/upload could corrupt
      # the artifact. Failing here aborts before Homebrew + AltStore point at the asset.
      # This is the check that would have caught the v1.25.14 bundle before it shipped.
      - name: Verify published bundle
        if: steps.version.outputs.bump != 'none' && env.SKIP_RELEASE != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/release-verify
          gh release download "${{ env.TAG }}" -D /tmp/release-verify -p CCUsage.zip --clobber
          unzip -q -o /tmp/release-verify/CCUsage.zip -d /tmp/release-verify/
          codesign --verify --deep --strict /tmp/release-verify/CCUsage.app

      # Associate this release with the Sentry project so issues surface "introduced in vX"
      # and unresolved errors tagged to prior releases auto-resolve when fixed. Skips silently
      # if SENTRY_AUTH_TOKEN isn't configured — can't reference secrets in `if:` directly,
      # so we gate in the shell.
      - name: Sentry release
        if: steps.version.outputs.bump != 'none' && env.SKIP_RELEASE != 'true'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: viktor-svirskyi
          SENTRY_PROJECT: ccusage
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ]; then
            echo "::notice::SENTRY_AUTH_TOKEN not set — skipping Sentry release association"
            exit 0
          fi
          curl -sL https://sentry.io/get-cli/ | sh
          sentry-cli releases new "ccusage@${{ env.VERSION }}"
          sentry-cli releases set-commits --auto "ccusage@${{ env.VERSION }}" || true
          sentry-cli releases finalize "ccusage@${{ env.VERSION }}"

      - name: Update Homebrew tap
        if: steps.version.outputs.bump != 'none' && env.SKIP_RELEASE != 'true'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          SHA256=$(shasum -a 256 CCUsage.zip | awk '{print $1}')
          cat > /tmp/ccusage.rb <<'CASK'
          cask "ccusage" do
            version "$VERSION"
            sha256 "$SHA256"

            url "https://github.com/viktor-svirsky/ccusage/releases/download/v#{version}/CCUsage.zip"
            name "CCUsage"
            desc "macOS menu bar app displaying Claude Code usage limits in real-time"
            homepage "https://github.com/viktor-svirsky/ccusage"

            depends_on macos: ">= :ventura"

            app "CCUsage.app"

            zap trash: [
              "~/Library/Preferences/com.ccusage.CCUsage.plist",
            ]
          end
          CASK
          sed -e 's/^          //' -e "s/\$VERSION/${{ env.VERSION }}/" -e "s/\$SHA256/${SHA256}/" /tmp/ccusage.rb > /tmp/ccusage_final.rb
          EXISTING_SHA=$(gh api repos/viktor-svirsky/homebrew-ccusage/contents/Casks/ccusage.rb --jq '.sha' 2>/dev/null || echo "")
          SHA_ARGS=""
          if [ -n "$EXISTING_SHA" ]; then
            SHA_ARGS="--field sha=$EXISTING_SHA"
          fi
          gh api repos/viktor-svirsky/homebrew-ccusage/contents/Casks/ccusage.rb \
            --method PUT \
            --field message="Update CCUsage to ${{ env.VERSION }}" \
            --field content="$(base64 < /tmp/ccusage_final.rb)" \
            $SHA_ARGS

      - name: Create post-release PR
        if: steps.version.outputs.bump != 'none' && env.SKIP_RELEASE != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Update AltStore source
          IPA_SIZE=$(stat -f%z CCUsageWidgetApp.ipa)
          DOWNLOAD_URL="https://github.com/viktor-svirsky/ccusage/releases/download/${{ env.TAG }}/CCUsageWidgetApp.ipa"
          DATE=$(date -u +%Y-%m-%d)
          python3 -c "
          import json
          with open('altstore-source.json') as f:
              source = json.load(f)
          new_version = {
              'version': '${{ env.VERSION }}',
              'date': '${DATE}',
              'downloadURL': '${DOWNLOAD_URL}',
              'size': ${IPA_SIZE},
              'localizedDescription': 'Update to v${{ env.VERSION }}'
          }
          versions = source['apps'][0]['versions']
          versions = [v for v in versions if v['version'] != '${{ env.VERSION }}']
          versions.insert(0, new_version)
          # Cap history: AltStore only needs the recent tail. Older entries just bloat
          # the JSON that every client downloads on refresh.
          versions = versions[:5]
          source['apps'][0]['versions'] = versions
          with open('altstore-source.json', 'w') as f:
              json.dump(source, f, indent=2)
              f.write('\n')
          "

          # Bump VERSION file
          echo "${{ env.VERSION }}" > VERSION

          BRANCH="chore/release-v${{ env.VERSION }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add VERSION altstore-source.json
          git commit -m "chore: release v${{ env.VERSION }} — bump VERSION + update AltStore"
          git push origin "$BRANCH" --force
          PR_URL=$(gh pr create \
            --title "chore: release v${{ env.VERSION }}" \
            --body "Auto-generated from merged PR: **${{ github.event.pull_request.title || inputs.version }}**

          - [x] GitHub Release created: ${{ env.TAG }}
          - [x] Homebrew tap updated
          - [x] Auto-merge enabled — will squash as soon as required checks pass" \
            --base main --head "$BRANCH")

          # Report check runs on PR branch so branch protection is satisfied.
          # Tests already passed earlier in this workflow — just report the results.
          PR_SHA=$(git rev-parse HEAD)
          for CHECK_NAME in test build build-widget validate-altstore; do
            gh api repos/${{ github.repository }}/check-runs -X POST \
              -f name="$CHECK_NAME" \
              -f head_sha="$PR_SHA" \
              -f status="completed" \
              -f conclusion="success" \
              -f "output[title]=Passed (from release workflow)" \
              -f "output[summary]=Tests passed during release v${{ env.VERSION }} build."
          done

          # Auto-merge: squash as soon as required checks pass. Keeps releases hands-off.
          # If mergeStateStatus is already CLEAN we merge immediately; otherwise we enable
          # auto-merge so GitHub does it the moment checks clear.
          STATE=$(gh pr view "$PR_URL" --json mergeStateStatus --jq .mergeStateStatus)
          if [ "$STATE" = "CLEAN" ]; then
            gh pr merge "$PR_URL" --squash --delete-branch
          else
            gh pr merge "$PR_URL" --squash --auto --delete-branch
          fi
