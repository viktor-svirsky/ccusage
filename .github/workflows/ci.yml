name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: make test

  build:
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build app
        run: make build

      - name: Create release archive
        run: |
          cd CCUsage.app && cd ..
          ditto -c -k --keepParent CCUsage.app CCUsage.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CCUsage.app
          path: CCUsage.zip
          retention-days: 90
