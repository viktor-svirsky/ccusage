name: Auto Version Bump

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  bump:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Determine bump type from PR title
        id: bump
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          echo "PR title: $TITLE"

          if echo "$TITLE" | grep -qiE '^feat(\(.*\))?!:|^[a-z]+(\(.*\))?!:|BREAKING CHANGE'; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$TITLE" | grep -qiE '^feat(\(.*\))?:'; then
            echo "type=minor" >> $GITHUB_OUTPUT
          elif echo "$TITLE" | grep -qiE '^fix(\(.*\))?:'; then
            echo "type=patch" >> $GITHUB_OUTPUT
          else
            echo "type=none" >> $GITHUB_OUTPUT
            echo "No version bump needed for: $TITLE"
          fi

      - name: Bump VERSION
        if: steps.bump.outputs.type != 'none'
        run: |
          CURRENT=$(cat VERSION)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ steps.bump.outputs.type }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "$NEW" > VERSION
          echo "Bumped $CURRENT → $NEW (${{ steps.bump.outputs.type }})"
          echo "NEW_VERSION=$NEW" >> $GITHUB_ENV
          echo "OLD_VERSION=$CURRENT" >> $GITHUB_ENV

      - name: Commit and push
        if: steps.bump.outputs.type != 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version ${OLD_VERSION} → ${NEW_VERSION} [skip ci]"
          git push
